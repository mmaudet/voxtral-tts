model_list:
  - model_name: voxtral-tts
    litellm_params:
      model: openai/mistralai/Voxtral-4B-TTS-2603
      api_base: http://localhost:8000/v1
      api_key: none
  - model_name: xtts-clone
    litellm_params:
      # XTTS v2 (Coqui) — voice cloning, served by xtts_server.py on loopback.
      # Reference samples live in /workspace/xtts_voices/<voice>.wav on the pod.
      model: openai/xtts-v2
      api_base: http://localhost:8002/v1
      api_key: none

general_settings:
  # The master key bypasses custom_auth entirely — keep it private. Read from
  # environment so it never lives in the YAML or a git-tracked file.
  master_key: os.environ/VOXTRAL_LITELLM_MASTER_KEY
  # Per-user pre-shared keys (no database). See auth.py for the allowlist.
  custom_auth: auth.user_api_key_auth

litellm_settings:
  drop_params: false
  request_timeout: 120
