model_list:
  - model_name: voxtral-tts
    litellm_params:
      # Voxtral-4B-TTS-2603 (Mistral, CC BY-NC 4.0). Native FR/DE/ES/IT/NL/PT/HI/AR
      # voices — best quality for European languages. Loopback only.
      model: openai/mistralai/Voxtral-4B-TTS-2603
      api_base: http://localhost:8003/v1
      api_key: none
  - model_name: qwen-tts
    litellm_params:
      # Qwen3-TTS-12Hz-1.7B-CustomVoice (Apache 2.0). Best for ZH/JA/KO and the
      # only commercial-friendly preset-voice path. Loopback only.
      model: openai/Qwen/Qwen3-TTS-12Hz-1.7B-CustomVoice
      api_base: http://localhost:8000/v1
      api_key: none

general_settings:
  # The master key bypasses custom_auth entirely — keep it private. Read from
  # environment so it never lives in the YAML or a git-tracked file.
  master_key: os.environ/VOXTRAL_LITELLM_MASTER_KEY
  # Per-user pre-shared keys (no database). See auth.py for the allowlist.
  custom_auth: auth.user_api_key_auth

litellm_settings:
  drop_params: false
  request_timeout: 120
